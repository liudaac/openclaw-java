# OpenClaw Heartbeat Configuration
# Add this to your application.yml or include this file

openclaw:
  agents:
    defaults:
      heartbeat:
        # Enable/disable heartbeat
        enabled: true
        
        # Heartbeat interval (ISO 8601 duration format)
        # PT30M = 30 minutes
        # PT1H = 1 hour
        # PT5M = 5 minutes
        every: PT30M
        
        # Max characters for HEARTBEAT_OK ack before treating as content
        ackMaxChars: 300
        
        # Target for heartbeat delivery
        # "last" - deliver to last active channel
        # "none" - no automatic delivery
        # or specific channel ID
        target: last
        
        # Custom heartbeat prompt (optional)
        # If not set, uses default prompt
        # prompt: "Read HEARTBEAT.md if it exists..."

# Spring Scheduling configuration
spring:
  task:
    scheduling:
      # Thread pool size for scheduled tasks
      pool:
        size: 10
      # Thread name prefix
      thread-name-prefix: heartbeat-
