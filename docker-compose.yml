version: '3.8'

services:
  openclaw-server:
    build:
      context: .
      dockerfile: openclaw-server/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENCLAW_GATEWAY_PORT=8080
      - OPENCLAW_MAX_NODES=100
      - OPENCLAW_QUEUE_CAPACITY=10000
      - OPENCLAW_WORKER_THREADS=10
      - OPENCLAW_MAX_AGENTS=10
      - OPENCLAW_AGENT_TIMEOUT=60000
      - OPENCLAW_STREAMING=true
      - SPRING_PROFILES_ACTIVE=prod
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/gateway/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - openclaw-network

  # Optional: Redis for distributed rate limiting
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - openclaw-network

  # Optional: Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped
    networks:
      - openclaw-network

  # Optional: Grafana for dashboards
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    networks:
      - openclaw-network

volumes:
  redis_data:
  grafana_data:

networks:
  openclaw-network:
    driver: bridge
